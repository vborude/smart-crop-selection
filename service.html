<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroSmart Services</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: url('sample3.jpg') no-repeat center center/cover;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 5%;
    align-items:center;
}

.logo{
    font-size:28px;
    color:orange;
    font-weight:bold;
}

.menu a{
    margin:0 15px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.menu a:hover{
    color:#00ffcc;
}

/* MAIN */
.main{
    padding:40px;
    text-align:center;
}

.main h1{
    margin-bottom:30px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.1);
    border-radius:15px;
    backdrop-filter: blur(10px);
    padding:20px;
    text-align:center;
    transition:0.4s;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.card:hover{
    transform: translateY(-10px) scale(1.05);
    box-shadow:0 0 25px rgba(0,255,200,0.5);
}

/* ICON */
.card img{
    width:80px;
    margin-bottom:15px;
}

/* TITLE */
.card h3{
    margin-bottom:10px;
}

/* BUTTON */
.card a{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    background: linear-gradient(45deg, #00ffcc, #00cc99);
    border-radius:25px;
    color:black;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.card a:hover{
    background: linear-gradient(45deg, #00cc99, #00ffcc);
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">AgroSmart</div>

    <div class="menu">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Crops</a>
        <a href="service.html">Services</a>
        <a href="design.html">Design</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="main">
    <h1>🌾 Our Smart Services</h1>

    <div class="grid">

        <!-- MARKET -->
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2331/2331970.png">
            <h3>Market Price</h3>
            <p>Check real-time mandi prices</p>
            <a href="https://agmarknet.gov.in" target="_blank">Open</a>
        </div>

        <!-- WEATHER -->
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1163/1163624.png">
            <h3>Weather</h3>
            <p>Live weather forecast</p>
            <a href="https://imd.gov.in" target="_blank">Open</a>
        </div>

        <!-- DISEASE -->
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2909/2909760.png">
            <h3>Crop Disease</h3>
            <p>Identify crop problems</p>
            <a href="https://mkisan.gov.in" target="_blank">Open</a>
        </div>

        <!-- SOIL -->
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2909/2909795.png">
            <h3>Soil Health</h3>
            <p>Check soil condition</p>
            <a href="https://soilhealth.dac.gov.in" target="_blank">Open</a>
        </div>

    </div>
</div>

</body>
</html>
