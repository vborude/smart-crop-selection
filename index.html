<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgroSmart - Home</title>

<script>
if (localStorage.getItem("loggedIn") === "true") {
    window.location.href = "second.html";
}
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:black;
    min-height:100vh;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 5%;
    flex-wrap:wrap;
}

.logo{
    font-size:28px;
    color:orange;
    font-weight:bold;
}

.menu a{
    margin:0 15px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.menu a:hover{
    color:#00ffcc;
}

/* MAIN */
.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:50px 5%;
    flex-wrap:wrap;
}

/* LEFT CONTENT */
.content{
    width:50%;
}

.content h1{
    font-size:48px;
}

.content span{
    color:#00ffcc;
}

.content p{
    margin:20px 0;
    line-height:1.6;
}

/* BUTTON */
.btn{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background: linear-gradient(45deg,#00ffcc,#00cc99);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* LOGIN CARD */
.login-box{
    width:300px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    transition:0.3s;
}

.login-box:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px rgba(0,255,200,0.5);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#00ffcc;
}

/* INPUT */
.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    outline:none;
}

/* LOGIN BUTTON */
.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background: linear-gradient(45deg,#00ffcc,#00cc99);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* LINKS */
.links{
    text-align:center;
    margin-top:10px;
}

.links a{
    display:block;
    color:#00ffcc;
    text-decoration:none;
    margin:5px 0;
    font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .main{
        flex-direction:column;
        text-align:center;
    }

    .content{
        width:100%;
        margin-bottom:30px;
    }
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">AgroSmart</div>

    <div class="menu">
        <a href="about.html">About</a>
        <a href="service.html">Services</a>
        <a href="design.html">Design</a>
        <a href="contact.html">Contact</a>
        
    </div>
</div>

<div class="main">

<!-- LEFT -->
<div class="content">
    <h1>Smart Crop <br><span>Selection System</span></h1>

    <p>
        AgroSmart helps farmers choose the best crops based on soil,
        weather, water availability, and other environmental factors.
        It provides smart recommendations to improve productivity.
    </p>

    <button class="btn">Get Started</button>
</div>


<div class="login-box">
    <h2>Login</h2>
    <form onsubmit="login(event)">

    <input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>

    <button type="submit">Login</button>

</form>

<br></br>
<a href="register.html">
    <button type="button">Register</button>
</a>
    
    
</div>

</div>
<script>
function login(e) {
    e.preventDefault();

    let enteredUser = document.getElementById("username").value.trim();
    let enteredPass = document.getElementById("password").value;

    let storedUser = JSON.parse(localStorage.getItem("user"));

    if (storedUser &&
        enteredUser === storedUser.username &&
        enteredPass === storedUser.password) {

        // SAVE LOGIN SESSION
        localStorage.setItem("loggedIn", "true");

        alert("Login Successful ✅");

        window.location.href = "second.html";

    } else {
        alert("Invalid Username or Password ❌");
    }
}
</script>
</body>
</html>
